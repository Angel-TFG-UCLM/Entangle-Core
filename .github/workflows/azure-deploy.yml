name: CI/CD Manual TFG

on:
  # 1. Se activa automático al hacer push en main O develop
  push:
    branches: [ "main", "develop" ]
  
  # 2. ¡Esto es lo que buscas! Te permite darle a un botón "Play" manual
  workflow_dispatch:

env:
  IMAGE_NAME: tfg-backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      # Login en tu registro privado de Azure (sin pedir permiso a la uni)
      - name: Log in to Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.AZURE_CONTAINER_REGISTRY_NAME }}.azurecr.io
          username: ${{ secrets.AZURE_REGISTRY_USERNAME }}
          password: ${{ secrets.AZURE_REGISTRY_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Construye y sube
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Aquí está el truco: usamos github.ref_name para que la etiqueta
          # sea el nombre de la rama (ej: tfg-backend:develop)
          tags: |
            ${{ secrets.AZURE_CONTAINER_REGISTRY_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ secrets.AZURE_CONTAINER_REGISTRY_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.AZURE_CONTAINER_REGISTRY_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.ref_name }}