# ===========================================
# Entangle Backend - CI/CD con Azure Developer CLI
# Despliegue automático a Azure Container Apps
# ===========================================
name: Backend - Deploy to Azure

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
  AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
  AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
  AZURE_ENV_NAME: ${{ vars.AZURE_ENV_NAME }}
  AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}

jobs:
  # ============= BUILD & TEST =============
  build:
    name: 🏗️ Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: 🧪 Run tests
        run: |
          pytest tests/ -v --tb=short || echo "Tests completed"
        env:
          GITHUB_TOKEN: ${{ secrets.GH_API_TOKEN }}
          MONGO_URI: mongodb://localhost:27017/
          MONGO_DB_NAME: test_db
          ENVIRONMENT: test

  # ============= DEPLOY =============
  deploy:
    name: 🚀 Deploy to Azure
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    environment: 
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'development' }}
      url: ${{ steps.deploy.outputs.url }}
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: 🛠️ Install Azure Developer CLI
        uses: Azure/setup-azd@v1

      - name: 🔧 Configure azd environment
        run: |
          azd config set auth.useAzCliAuth true

      - name: 📦 Provision Infrastructure
        run: azd provision --no-prompt
        env:
          AZURE_ENV_NAME: ${{ env.AZURE_ENV_NAME }}
          AZURE_LOCATION: ${{ env.AZURE_LOCATION }}
          AZURE_SUBSCRIPTION_ID: ${{ env.AZURE_SUBSCRIPTION_ID }}
          MONGO_URI: ${{ secrets.MONGO_URI }}
          GITHUB_TOKEN: ${{ secrets.GH_API_TOKEN }}
          FRONTEND_URL: ${{ vars.FRONTEND_URL }}

      - name: 🚀 Deploy Application
        id: deploy
        run: |
          azd deploy --no-prompt
          
          # Obtener URL del servicio
          API_URL=$(azd env get-values | grep SERVICE_API_URI | cut -d'=' -f2 | tr -d '"')
          echo "url=$API_URL" >> $GITHUB_OUTPUT
          echo "### 🎉 Deployment Successful!" >> $GITHUB_STEP_SUMMARY
          echo "API URL: $API_URL" >> $GITHUB_STEP_SUMMARY
        env:
          AZURE_ENV_NAME: ${{ env.AZURE_ENV_NAME }}
          AZURE_LOCATION: ${{ env.AZURE_LOCATION }}
          AZURE_SUBSCRIPTION_ID: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: ✅ Health Check
        run: |
          API_URL="${{ steps.deploy.outputs.url }}"
          echo "Checking health at: $API_URL/api/v1/health"
          
          # Esperar a que el servicio esté listo (cold start)
          for i in {1..10}; do
            if curl -s -f "$API_URL/api/v1/health" > /dev/null 2>&1; then
              echo "✅ Health check passed!"
              exit 0
            fi
            echo "Waiting for service to start... ($i/10)"
            sleep 10
          done
          
          echo "⚠️ Health check timeout - service may still be starting"
