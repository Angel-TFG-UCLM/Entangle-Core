name: Trigger auto deployment for entangle-api

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ develop ]
    paths:
    - '**'
    - '.github/workflows/entangle-api-AutoDeployTrigger-2392ff8f-6977-4f84-a29b-5a8b401d9070.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ENTANGLEAPI_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.ENTANGLEAPI_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.ENTANGLEAPI_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: acrentangle.azurecr.io
          registryUsername: ${{ secrets.ENTANGLEAPI_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.ENTANGLEAPI_REGISTRY_PASSWORD }}
          containerAppName: entangle-api
          resourceGroup: rg-entangle-prod
          imageToBuild: acrentangle.azurecr.io/entangle-api:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


