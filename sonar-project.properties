# =====================================================
# SonarCloud configuration - Entangle Core (Backend)
# =====================================================
sonar.projectKey=Angel-TFG-UCLM_Entangle-Core
sonar.organization=angel-tfg-uclm
sonar.projectName=entangle-backend

# --- Codigo fuente y exclusiones ---
sonar.sources=src
sonar.tests=tests

# Excluimos archivos auto-generados, scripts utilitarios y docs
sonar.exclusions=\
    **/__pycache__/**,\
    **/*.pyc,\
    **/migrations/**,\
    scripts/_*.py,\
    scripts/run_*.py,\
    scripts/check_*.py,\
    scripts/quick_check.py,\
    scripts/audit_dataset.py,\
    scripts/clean_dataset.py,\
    scripts/reset_*.py,\
    scripts/test_*.py,\
    scripts/validate_*.py,\
    scripts/analyze_*.py,\
    config/**,\
    infra/**,\
    docs/**,\
    logs/**

# Cobertura: pytest-cov genera coverage.xml en formato Cobertura
sonar.python.coverage.reportPaths=coverage.xml
sonar.python.version=3.11

# Localizar tests para metricas de cobertura
sonar.test.inclusions=tests/**/test_*.py
sonar.coverage.exclusions=\
    src/api/main.py,\
    src/core/logger.py,\
    tests/**

# Codificacion fuente
sonar.sourceEncoding=UTF-8
