# =====================================================
# SonarQube LOCAL (Docker self-hosted) - Backend
# =====================================================
# Este archivo se usa cuando se ejecuta scripts/Run-LocalSonar.ps1
# Apunta a los projectKeys del SonarQube Community local, distintos
# a los de SonarCloud (que viven en sonar-project.properties).
#
sonar.projectKey=entangle-backend
sonar.projectName=entangle-backend

# --- Codigo fuente y exclusiones (igual que Cloud) ---
sonar.sources=src
sonar.tests=tests

sonar.exclusions=\
    **/__pycache__/**,\
    **/*.pyc,\
    **/migrations/**,\
    scripts/_*.py,\
    scripts/run_*.py,\
    scripts/check_*.py,\
    scripts/quick_check.py,\
    scripts/audit_dataset.py,\
    scripts/clean_dataset.py,\
    scripts/reset_*.py,\
    scripts/test_*.py,\
    scripts/validate_*.py,\
    scripts/analyze_*.py,\
    config/**,\
    infra/**,\
    docs/**,\
    logs/**

sonar.python.coverage.reportPaths=coverage.xml
sonar.python.version=3.11

sonar.test.inclusions=tests/**/test_*.py
sonar.coverage.exclusions=\
    src/api/main.py,\
    src/core/logger.py,\
    tests/**

sonar.sourceEncoding=UTF-8
